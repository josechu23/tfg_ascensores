
<div class="row justify-content-center mt-5">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-elevator fs-1 text-primary"></i>
                    <h4 class="mt-2 fw-bold">Sistema Experto</h4>
                    <p class="text-muted small">Diagnóstico de averías en ascensores</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">
                            Usuario
                        </label>
                        <input
                            type="text"
                            name="username"
                            id="id_username"
                            class="form-control"
                            autofocus
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-semibold">
                            Contraseña
                        </label>
                        <input
                            type="password"
                            name="password"
                            id="id_password"
                            class="form-control"
                            required
                        >
                    </div>

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger py-2 mb-3">
                            <i class="bi bi-exclamation-circle"></i>
                            Usuario o contraseña incorrectos.
                        </div>
                    {% endif %}

                    <button type="submit" class="btn btn-primary w-100 mt-2">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Iniciar sesión
                    </button>

                </form>

            </div>
        </div>
    </div>
</div>
